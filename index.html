<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f6fa;color:#2d3436;font-size:14px}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.hicon{width:32px;height:32px;background:#6c63ff;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header h1{font-size:17px;font-weight:700;color:#1a1a2e}
.main{padding:20px 24px;max-width:1400px;margin:0 auto}
.sel-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.sel-box{background:#fff;border-radius:12px;border:2px solid #e8e8e8;padding:14px 18px;transition:border-color .2s}
.sel-box.active-f{border-color:#6c63ff}
.sel-box.active-t{border-color:#f0932b}
.sel-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-f{background:#6c63ff}.dot-t{background:#f0932b}
.lf{color:#6c63ff}.lt{color:#f0932b}
.pgrid{display:flex;flex-wrap:wrap;gap:7px}
.pbtn{padding:5px 15px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:#555;transition:all .15s}
.pbtn:hover{border-color:#999}
.pbtn.sel-f{background:#6c63ff;border-color:#6c63ff;color:#fff;font-weight:700}
.pbtn.sel-t{background:#f0932b;border-color:#f0932b;color:#fff;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.sc{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #e8e8e8}
.sc-lbl{font-size:11px;color:#888;font-weight:600;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-val{font-size:30px;font-weight:700}
.sc-sub{font-size:11px;color:#bbb;margin-top:3px}
.cf{color:#6c63ff}.ct{color:#f0932b}.cd{color:#2d3436}.cg{color:#00b894}
.tables{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ts{background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow:visible;display:flex;flex-direction:column}
.ts-head{padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ts-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px}
.arr{color:#bbb;font-size:12px;margin:0 2px}
.pill{background:#f0f0f0;color:#555;padding:2px 9px;border-radius:8px;font-size:11px;font-weight:700}
.frow{padding:8px 14px 4px;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.fbtn{padding:3px 10px;border-radius:9px;border:1px solid #e0e0e0;background:#fff;font-size:11px;cursor:pointer;color:#666;transition:all .12s}
.fbtn.ff{background:#6c63ff;border-color:#6c63ff;color:#fff}
.fbtn.ft{background:#f0932b;border-color:#f0932b;color:#fff}
.sw{overflow:visible}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 12px;font-size:10px;font-weight:600;color:#999;text-align:left;background:#fafafa;border-bottom:1px solid #f0f0f0;white-space:nowrap}
tbody td{padding:8px 12px;font-size:12px;border-bottom:1px solid #f7f7f7;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafbff}
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700}
.b1{background:#fff0f0;color:#e84118}
.b2{background:#fff5e0;color:#e67e22}
.b3{background:#ede9ff;color:#6c63ff}
.nam{font-weight:500;max-width:140px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.reg{font-size:10px;color:#bbb}
.amf{color:#6c63ff;font-weight:600}
.amt{color:#f0932b;font-weight:600}
.empty{padding:36px;text-align:center;color:#ccc;font-size:13px}
/* 메모 셀 */
.memo-cell{min-width:160px;max-width:220px}
.memo-view{display:flex;align-items:center;gap:6px;min-height:28px}
.memo-text{font-size:12px;color:#444;flex:1;word-break:break-all;line-height:1.4}
.memo-empty{font-size:11px;color:#ccc;flex:1}
.btn-edit{padding:2px 8px;border-radius:6px;border:1px solid #d0cdf7;background:#f5f4ff;color:#6c63ff;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-edit:hover{background:#6c63ff;color:#fff}
.memo-edit{display:none;flex-direction:column;gap:5px}
.memo-edit.active{display:flex}
.memo-input{width:100%;padding:5px 8px;border:1.5px solid #6c63ff;border-radius:7px;font-size:12px;font-family:inherit;resize:none;outline:none;color:#333;line-height:1.4}
.memo-btns{display:flex;gap:5px}
.btn-save{padding:3px 10px;border-radius:6px;border:none;background:#6c63ff;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.btn-save:hover{background:#5548e0}
.btn-cancel{padding:3px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#888;font-size:11px;cursor:pointer}
.btn-cancel:hover{background:#f5f5f5}
</style>

function buildButtons(){
  const fromsRaw=[...new Set(DATA.map(r=>r.from))].filter(v=>v&&v!=='T4').sort();
  const froms=[...fromsRaw,'T4'];
  const tosRaw=[...new Set(DATA.map(r=>r.to))].filter(v=>v&&v!=='T4').sort();
  const tos=[...tosRaw,'T4'];
  buildGrid('gridF',froms,'f');
  buildGrid('gridT',tos,'t');
}

function buildGrid(id,list,type){
  const g=document.getElementById(id);g.innerHTML='';
  list.forEach(name=>{
    const b=document.createElement('button');
    b.className='pbtn';b.textContent=name;b.dataset.name=name;
    b.addEventListener('click',()=>toggle(type,name));
    g.appendChild(b);
  });
}

function toggle(type,name){
  if(type==='f'){
    selF=selF===name?null:name;filtL='all';
    document.querySelectorAll('#gridF .pbtn').forEach(b=>b.classList.toggle('sel-f',b.dataset.name===selF));
    document.getElementById('boxF').className='sel-box'+(selF?' active-f':'');
  }else{
    selT=selT===name?null:name;filtR='all';
    document.querySelectorAll('#gridT .pbtn').forEach(b=>b.classList.toggle('sel-t',b.dataset.name===selT));
    document.getElementById('boxT').className='sel-box'+(selT?' active-t':'');
  }
  render();
}

function byTier(arr,f){return f==='all'?arr:arr.filter(r=>r.tier===f);}

function render(){
  const fAll=selF?DATA.filter(r=>r.from===selF):[];
  const tAll=selT?DATA.filter(r=>r.from===selT):[];
  const lData=(selF&&selT)?fAll.filter(r=>r.to===selT):fAll;
  const rData=(selF&&selT)?tAll.filter(r=>r.to===selF):tAll;

  setText('lbl0',`📤 ${selF||'기존 AM'} 담당 병원 수`);
  setText('val0',selF?fAll.length:'-');
  setText('sub0',selF?'비동기 병원 제외':'기존 AM을 선택하세요');
  setText('lbl1',`📥 ${selT||'변경 AM'} 담당 병원 수`);
  setText('val1',selT?tAll.length:'-');
  setText('sub1',selT?'비동기 병원 제외':'변경 AM을 선택하세요');
  setText('lbl2',`📋 ${selF||'기존AM'} → ${selT||'변경AM'} 병원 수`);
  setText('val2',(selF&&selT)?lData.length:'-');
  setText('lbl3',`📋 ${selT||'변경AM'} → ${selF||'기존AM'} 병원 수`);
  setText('val3',(selF&&selT)?rData.length:'-');

  document.getElementById('ltitle').innerHTML=selF
    ?`<span class="amf">${selF}</span><span class="arr">→</span><span class="amt">${selT||'전체'}</span>`
    :'기존 AM 담당 병원';
  document.getElementById('rtitle').innerHTML=selT
    ?`<span class="amf">${selT}</span><span class="arr">→</span><span class="amt">${selF||'전체'}</span>`
    :'변경 AM 담당 병원';

  renderFilt('lfilt',lData,'l',filtL);
  renderFilt('rfilt',rData,'r',filtR);
  setText('lcnt',byTier(lData,filtL).length);
  setText('rcnt',byTier(rData,filtR).length);
  renderTbl('ltbl',lData,'l',filtL);
  renderTbl('rtbl',rData,'r',filtR);
}

function renderFilt(id,data,side,cur){
  const c=document.getElementById(id);c.innerHTML='';
  if(!data.length)return;
  ['all','Tier1','Tier2','Tier3'].forEach(t=>{
    const cnt=t==='all'?data.length:data.filter(r=>r.tier===t).length;
    const b=document.createElement('button');
    b.className='fbtn'+(cur===t?(side==='l'?' ff':' ft'):'');
    b.textContent=(t==='all'?'전체':t)+` (${cnt})`;
    b.addEventListener('click',()=>{if(side==='l')filtL=t;else filtR=t;render();});
    c.appendChild(b);
  });
}

// 메모 저장소 (세션 내 캐시 + window.storage 영구저장)
const // === Firebase 설정 (Firebase 콘솔 → 프로젝트 설정 → 내 앱에서 복사) ===
const firebaseConfig = {
  apiKey: "AIzaSyA-MAQHq5g0IdH91LnIN7nVFsC1z-Cv4Xg",
  authDomain: "hp-sale-handover.firebaseapp.com",
  databaseURL: "https://hp-sale-handover-default-rtdb.asia-southeast1.firebasedatabase.app",

firebase.initializeApp(firebaseConfig);
const _auth = firebase.auth();
const _db   = firebase.database();
let _fbReady = false;

let memoStore = {};

function sanitizeKey(k){
  // Firebase path에서 허용 안 되는 문자 치환: . # $ [ ] /
  return k.replace(/[.#$\/\[\]]/g,'_');
}

async function loadMemos(){
  try{
    if(!_auth.currentUser){
      await _auth.signInAnonymously();
    }
    const snap = await _db.ref('memos').get();
    if(snap.exists()) Object.assign(memoStore, snap.val());
    _fbReady = true;
    console.log('[메모] Firebase 로드 완료:', Object.keys(memoStore).length, '개');
  }catch(e){
    console.error('[메모] Firebase 연결 실패, localStorage 폴백:', e);
    try{
      const saved = localStorage.getItem('hospital-memos-26-3');
      if(saved) Object.assign(memoStore, JSON.parse(saved));
    }catch(e2){}
  }
}

async function writeMemo(key, val){
  const safeKey = sanitizeKey(key);
  if(_fbReady){
    try{
      if(val){ await _db.ref('memos/'+safeKey).set(val); }
      else   { await _db.ref('memos/'+safeKey).remove(); }
    }catch(e){ console.error('[메모] Firebase 쓰기 실패:', e); }
  }else{
    // 폴백: localStorage
    try{
      const data = JSON.stringify(memoStore);
      localStorage.setItem('hospital-memos-26-3', data);
    }catch(e){}
  }
}

function getMemoKey(name, side){ return side + '::' + name; }

function renderTbl(id,data,side,filt){
  const tb=document.getElementById(id);
  if(!data.length){tb.innerHTML=`<tr><td colspan="6" class="empty">${side==='l'?'기존 AM을 선택하세요':'변경 AM을 선택하세요'}</td></tr>`;return;}
  const rows=byTier(data,filt);
  if(!rows.length){tb.innerHTML='<tr><td colspan="6" class="empty">해당 티어의 병원이 없습니다</td></tr>';return;}
  const bc=t=>t==='Tier1'?'b1':t==='Tier2'?'b2':'b3';
  tb.innerHTML=rows.map((r,i)=>{
    const key=getMemoKey(r.name, side);
    const safeKey=sanitizeKey(key);
    const memo=memoStore[safeKey]||'';
    const rowId=`memo-${side}-${i}`;
    return `<tr>
    <td class="reg">${r.region}</td>
    <td class="nam" title="${r.name}">${r.name}</td>
    <td><span class="badge ${bc(r.tier)}">${r.tier||'-'}</span></td>
    <td class="amf">${r.from}</td>
    <td class="amt">${r.toD||r.to}</td>
    <td class="memo-cell">
      <div class="memo-view" id="view-${rowId}">
        ${memo
          ? `<span class="memo-text">${escHtml(memo)}</span>`
          : `<span class="memo-empty">-</span>`
        }
        <button class="btn-edit" onclick="startEdit('${rowId}','${escAttr(r.name)}','${side}')">✏️ ${memo?'수정':'입력'}</button>
      </div>
      <div class="memo-edit" id="edit-${rowId}">
        <textarea class="memo-input" id="input-${rowId}" rows="2">${escHtml(memo)}</textarea>
        <div class="memo-btns">
          <button class="btn-save" onclick="saveMemo('${rowId}','${escAttr(r.name)}','${side}')">저장</button>
          <button class="btn-cancel" onclick="cancelEdit('${rowId}')">취소</button>
        </div>
      </div>
    </td>
  </tr>`;
  }).join('');
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

function startEdit(rowId, name, side){
  document.getElementById('view-'+rowId).style.display='none';
  const ed=document.getElementById('edit-'+rowId);
  ed.classList.add('active');
  const inp=document.getElementById('input-'+rowId);
  const key=sanitizeKey(getMemoKey(name,side));
  inp.value=memoStore[key]||'';
  inp.focus();
}

function cancelEdit(rowId){
  document.getElementById('view-'+rowId).style.display='flex';
  document.getElementById('edit-'+rowId).classList.remove('active');
}

async function saveMemo(rowId, name, side){
  const key=getMemoKey(name,side);
  const safeKey=sanitizeKey(key);
  const val=document.getElementById('input-'+rowId).value.trim();
  memoStore[safeKey]=val;
  await writeMemo(key, val);
  // 뷰 업데이트
  const viewEl=document.getElementById('view-'+rowId);
  viewEl.innerHTML= val
    ? `<span class="memo-text">${escHtml(val)}</span><button class="btn-edit" onclick="startEdit('${rowId}','${escAttr(name)}','${side}')">✏️ 수정</button>`
    : `<span class="memo-empty">-</span><button class="btn-edit" onclick="startEdit('${rowId}','${escAttr(name)}','${side}')">✏️ 입력</button>`;
  viewEl.style.display='flex';
  document.getElementById('edit-'+rowId).classList.remove('active');
  showSaveBadge();
}

function exportMemos(){
  const data = JSON.stringify(memoStore, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '병원_메모_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

async function importMemos(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const parsed = JSON.parse(e.target.result);
      // Firebase에 일괄 업로드
      if(_fbReady){
        await _db.ref('memos').update(parsed);
      }
      Object.assign(memoStore, parsed);
      render();
      showSaveBadge('✅ 메모 가져오기 완료 ('+Object.keys(parsed).length+'개)');
    }catch(err){
      alert('메모 파일을 읽을 수 없습니다.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function showSaveBadge(msg){
  let badge = document.getElementById('save-badge');
  if(!badge){
    badge = document.createElement('div');
    badge.id = 'save-badge';
    badge.style.cssText='position:fixed;bottom:20px;right:20px;background:#00b894;color:#fff;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:opacity .4s';
    document.body.appendChild(badge);
  }
  badge.textContent = msg || '✅ 메모 저장됨';
  badge.style.opacity='1';
  clearTimeout(badge._t);
  badge._t = setTimeout(()=>{ badge.style.opacity='0'; }, 2000);
}

function setText(id,v){document.getElementById(id).textContent=v;}

// 초기화: Firebase 로드 후 UI 렌더
loadMemos().then(()=>{ buildButtons(); render(); });
</script>
